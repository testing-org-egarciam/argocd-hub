apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/testing-org-egarciam/laura-app.git'
    targetRevision: HEAD
    path: apps/nginx
  destination:
    server: https://172.18.0.4:6443
    namespace: nginx-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
