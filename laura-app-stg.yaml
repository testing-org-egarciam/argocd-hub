apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: laura-app-stg
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://172.18.0.3:6443
  project: laura-project
  sources:
  - helm:
      valueFiles:
      - $values/values/laura-app/stg.yaml
    path: charts/laura-app
    repoURL: https://github.com/testing-org-egarciam/laura-app.git
    targetRevision: HEAD
  - ref: values
    repoURL: https://github.com/testing-org-egarciam/gitops-config.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
