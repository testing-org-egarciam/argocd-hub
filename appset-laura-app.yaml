apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: laura-app
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - list:
      elements:
      - cluster: prod
        server: https://172.18.0.2:6443
      - cluster: stg
        server: https://172.18.0.4:6443
  template:
    metadata:
      name: 'laura-app-{{.cluster}}'
    spec:
      project: laura-project
      sources:
      - repoURL: 'https://github.com/testing-org-egarciam/laura-app.git'
        path: charts/laura-app
        targetRevision: main
        helm:
          valueFiles:
          - $values/values/laura-app/{{.cluster}}.yaml
      - repoURL: 'https://github.com/testing-org-egarciam/gitops-config.git'
        targetRevision: main
        ref: values
      destination:
        server: '{{.server}}'
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
